<!-- games/test-square.html (с отладкой) -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🟦 Тест квадратики 2P (DEBUG)</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    body { background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial; touch-action:pan-y; position:fixed; width:100%; height:100%; }
    .game-container { width:100%; height:100vh; display:flex; flex-direction:column; position:relative; background:#222; }
    canvas { display:block; width:100%; height:100%; touch-action:none; outline:none; }
    .ui-overlay { position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.5); padding:5px 15px; border-radius:30px; z-index:10; }
    #debug { position:absolute; top:60px; left:10px; color:#0f0; background:rgba(0,0,0,0.7); padding:5px; font-size:12px; border-radius:8px; max-height:200px; overflow-y:auto; }
    .touch-controls { position:absolute; bottom:30px; left:20px; right:20px; display:flex; justify-content:space-between; align-items:flex-end; pointer-events:none; z-index:20; }
    .joystick-container { width:110px; height:110px; background:rgba(255,255,255,0.2); border-radius:60px; backdrop-filter:blur(4px); border:2px solid #aaa; position:relative; pointer-events:auto; touch-action:none; }
    .joystick-thumb { width:50px; height:50px; background:#fff; border-radius:30px; position:absolute; left:30px; top:30px; box-shadow:0 4px 0 #aaa; transition:transform 0.02s; pointer-events:none; }
    .key-hint { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:white; background:rgba(0,0,0,0.5); padding:8px 20px; border-radius:30px; pointer-events:none; z-index:15; }
    @media (pointer:fine) { .touch-controls { display:none; } .key-hint { display:block; } }
    @media (pointer:coarse) { .key-hint { display:none; } }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" tabindex="0"></canvas>
  <div class="ui-overlay" id="statusDisplay">Ожидание...</div>
  <div id="debug">Логи:</div>
  <div class="key-hint">←↑↓→ — двигать свой квадрат</div>
  <div class="touch-controls">
    <div class="joystick-container" id="joystickBase"><div class="joystick-thumb" id="joystickThumb"></div></div>
  </div>
</div>
<script>
  (function(){
    "use strict";
    const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
    let cw,ch;
    const debugEl = document.getElementById('debug');
    
    let roomId=null, userId=null, nickname='', players={}, gameState={}, myId=null;
    let gameActive=false;
    let myPos={x:200, y:200};
    const SIZE=50;
    
    let moveUp=false, moveDown=false, moveLeft=false, moveRight=false;
    let joystickActive=false, joystickVector={x:0,y:0};
    const joystickMaxDist=40;
    const joystickBase=document.getElementById('joystickBase'), joystickThumb=document.getElementById('joystickThumb');
    const statusDisplay=document.getElementById('statusDisplay');
    const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||('ontouchstart' in window);
    
    function log(msg) { console.log('[SQUARE]', msg); debugEl.innerHTML += '<br>'+msg; debugEl.scrollTop=debugEl.scrollHeight; }
    
    canvas.focus();
    canvas.addEventListener('click',()=>canvas.focus());
    canvas.addEventListener('touchstart',()=>canvas.focus(),{passive:false});
    
    let lastMoveSent=0;
    const MOVE_THROTTLE=30;
    
    function postMessage(type,data={}){ 
      log(`📤 ${type} ${JSON.stringify(data).substring(0,50)}`);
      window.parent.postMessage({type,...data},'*');
    }
    
    window.addEventListener('message',(e)=>{
      const d=e.data; if(!d||typeof d!=='object') return;
      log(`📨 ${d.type}`);
      switch(d.type){
        case 'init':
          roomId=d.roomId; userId=d.userId; nickname=d.nickname; players=d.players||{}; gameState=d.gameState||{};
          myId=userId;
          log(`🎮 Init myId=${myId}, players=${Object.keys(players)}`);
          if(!gameState.players){
            gameState.players={};
            Object.keys(players).forEach((id,idx)=>{
              gameState.players[id]={x:200+idx*100, y:200+idx*80};
              log(`  spawn ${id} at (${gameState.players[id].x},${gameState.players[id].y})`);
            });
            postMessage('state_update',{gameState});
          }
          if(gameState.players[myId]){ myPos.x=gameState.players[myId].x; myPos.y=gameState.players[myId].y; }
          gameActive=true;
          updateStatus();
          break;
        case 'state_update':
          gameState=d.gameState||{};
          log(`🔄 state_update players: ${JSON.stringify(gameState.players)}`);
          if(gameState.players){
            if(gameState.players[myId]){ myPos.x=gameState.players[myId].x; myPos.y=gameState.players[myId].y; }
          }
          updateStatus();
          break;
        case 'game_over':
          gameActive=false;
          break;
      }
    });
    
    function updateStatus(){
      let txt=`Вы: ${nickname} (${myPos.x.toFixed(0)},${myPos.y.toFixed(0)}) | `;
      for(let id in players){
        if(id===myId) continue;
        const p=gameState.players?.[id]||{x:0,y:0};
        txt+=`${players[id].nickname}: (${p.x?.toFixed(0)||0},${p.y?.toFixed(0)||0}) `;
      }
      statusDisplay.textContent=txt;
    }
    
    function sendMove(){
      if(!gameActive) return;
      const now=Date.now();
      if(now-lastMoveSent<MOVE_THROTTLE) return;
      lastMoveSent=now;
      postMessage('player_action',{action:'move',x:myPos.x,y:myPos.y});
    }
    
    function moveLocal(){
      if(!gameActive) return;
      let dx=0,dy=0; const speed=3;
      if(joystickActive){
        const len=Math.hypot(joystickVector.x,joystickVector.y);
        if(len>0.2){ dx=(joystickVector.x/len)*speed; dy=(joystickVector.y/len)*speed; }
      }else if(!isMobile){
        if(moveUp) dy=-speed; if(moveDown) dy=speed;
        if(moveLeft) dx=-speed; if(moveRight) dx=speed;
      }
      if(dx!==0||dy!==0){
        myPos.x=Math.max(SIZE/2, Math.min(cw-SIZE/2, myPos.x+dx));
        myPos.y=Math.max(SIZE/2, Math.min(ch-SIZE/2, myPos.y+dy));
        sendMove();
      }
    }
    
    function draw(){
      cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight;
      ctx.clearRect(0,0,cw,ch);
      ctx.fillStyle='#3a9bdc';
      ctx.fillRect(myPos.x-SIZE/2, myPos.y-SIZE/2, SIZE, SIZE);
      ctx.fillStyle='white';
      ctx.font='bold 14px Arial';
      ctx.textAlign='center';
      ctx.fillText(nickname||'Вы', myPos.x, myPos.y-30);
      
      if(gameState.players){
        for(let id in gameState.players){
          if(id===myId) continue;
          const p=gameState.players[id];
          if(!p) continue;
          ctx.fillStyle='#e94560';
          ctx.fillRect(p.x-SIZE/2, p.y-SIZE/2, SIZE, SIZE);
          ctx.fillStyle='white';
          ctx.fillText(players[id]?.nickname||id, p.x, p.y-30);
        }
      }
    }
    
    function joyStart(e){ e.preventDefault(); joystickActive=true; const r=joystickBase.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2; const t=e.touches[0]; updateJoystick(t.clientX-cx,t.clientY-cy); }
    function joyMove(e){ e.preventDefault(); if(!joystickActive) return; const r=joystickBase.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2; const t=e.touches[0]; updateJoystick(t.clientX-cx,t.clientY-cy); }
    function joyEnd(e){ e.preventDefault(); joystickActive=false; joystickVector={x:0,y:0}; joystickThumb.style.transform='translate(0px,0px)'; }
    function updateJoystick(dx,dy){ const dist=Math.hypot(dx,dy), clamped=Math.min(dist,joystickMaxDist), ang=Math.atan2(dy,dx), lx=Math.cos(ang)*clamped, ly=Math.sin(ang)*clamped; joystickThumb.style.transform=`translate(${lx}px,${ly}px)`; joystickVector=dist>5?{x:dx/joystickMaxDist,y:dy/joystickMaxDist}:{x:0,y:0}; }
    
    function keyDown(e){
      if(!gameActive) return;
      const k=e.code;
      if(k==='ArrowUp'){ moveUp=true; e.preventDefault(); }
      else if(k==='ArrowDown'){ moveDown=true; e.preventDefault(); }
      else if(k==='ArrowLeft'){ moveLeft=true; e.preventDefault(); }
      else if(k==='ArrowRight'){ moveRight=true; e.preventDefault(); }
    }
    function keyUp(e){
      const k=e.code;
      if(k==='ArrowUp'){ moveUp=false; e.preventDefault(); }
      else if(k==='ArrowDown'){ moveDown=false; e.preventDefault(); }
      else if(k==='ArrowLeft'){ moveLeft=false; e.preventDefault(); }
      else if(k==='ArrowRight'){ moveRight=false; e.preventDefault(); }
    }
    
    window.addEventListener('keydown',keyDown);
    window.addEventListener('keyup',keyUp);
    joystickBase.addEventListener('touchstart',joyStart,{passive:false});
    joystickBase.addEventListener('touchmove',joyMove,{passive:false});
    joystickBase.addEventListener('touchend',joyEnd);
    joystickBase.addEventListener('touchcancel',joyEnd);
    canvas.addEventListener('touchstart',(e)=>e.preventDefault(),{passive:false});
    canvas.addEventListener('touchmove',(e)=>e.preventDefault(),{passive:false});
    
    function loop(){
      if(gameActive) moveLocal();
      draw();
      requestAnimationFrame(loop);
    }
    postMessage('iframe_ready');
    log('🚀 Iframe ready');
    loop();
  })();
</script>
</body>
</html>
