<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BIBLIX — игровая вселенная</title>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

<canvas id="starfield"></canvas>

<header class="header glass">
  <div class="header__logo">BIBLIX</div>
  <div class="header__right">
    <div id="guest-buttons" class="header__guest">
      <button class="btn btn-outline" id="login-btn">Вход</button>
      <button class="btn btn-primary" id="register-btn">Регистрация</button>
    </div>
    <div id="user-panel" class="header__user" style="display: none;">
      <div class="user-balance" id="user-balance">💰 500</div>
      <button class="icon-btn" id="shop-btn" title="Магазин">🛒</button>
      <button class="icon-btn" id="inventory-btn" title="Мои скины">🎨</button>
      <button class="icon-btn" id="create-game-btn" title="Создать игру">➕</button>
      <div class="user-avatar" id="user-avatar" style="background: #6C5CE7;">U</div>
      <button class="icon-btn" id="logout-btn" title="Выйти">↪️</button>
    </div>
    <button class="icon-btn" id="fullscreen-btn" title="На весь экран">⛶</button>
  </div>
</header>

<section class="filters-section glass">
  <div class="search-wrapper">
    <input type="text" id="search-input" placeholder="🔍 Поиск игр..." class="search-input">
  </div>
  <div class="filter-tabs">
    <button class="filter-btn active" data-filter="all">Все</button>
    <button class="filter-btn" data-filter="1">1 игрок</button>
    <button class="filter-btn" data-filter="2">2 игрока</button>
    <button class="filter-btn" data-filter="3">3 игрока</button>
  </div>
  <div class="sort-wrapper">
    <select id="sort-select" class="sort-select">
      <option value="newest">Новые</option>
      <option value="popular">Популярные</option>
    </select>
  </div>
</section>

<main id="games-grid" class="games-grid">
  <div class="loader">Загрузка игр...</div>
</main>

<div id="game-container" class="game-container" style="display: none;">
  <div class="game-header">
    <button id="close-game-btn" class="btn btn-outline-small">✕ Закрыть</button>
    <span id="game-title-display"></span>
  </div>
  <iframe id="game-iframe" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
</div>

<div id="auth-modal" class="modal" style="display: none;">
  <div class="modal-content glass">
    <span class="close-modal">&times;</span>
    <h2 id="auth-modal-title">Вход</h2>
    <form id="auth-form">
      <input type="text" id="auth-nickname" placeholder="Никнейм" required maxlength="20" pattern="[A-Za-z0-9_]{3,20}">
      <input type="password" id="auth-password" placeholder="Пароль" required minlength="6">
      <button type="submit" class="btn btn-primary" id="auth-submit-btn">Войти</button>
      <p class="auth-switch">Нет аккаунта? <a href="#" id="switch-to-register">Зарегистрироваться</a></p>
    </form>
  </div>
</div>

<div id="create-modal" class="modal" style="display: none;">
  <div class="modal-content glass">
    <span class="close-modal">&times;</span>
    <h2>Создать игру</h2>
    <form id="create-game-form">
      <input type="text" id="game-title" placeholder="Название игры" required minlength="3" maxlength="30">
      <select id="game-players" required>
        <option value="1">1 игрок</option>
        <option value="2">2 игрока</option>
        <option value="3">3 игрока</option>
      </select>
      <div class="file-upload">
        <label>Аватарка игры (PNG/JPG, до 1 МБ)</label>
        <input type="file" id="game-avatar" accept="image/png, image/jpeg" required>
        <img id="avatar-preview" class="preview-img" style="display: none;">
      </div>
      <div class="file-upload">
        <label>HTML-файл игры (до 60 КБ)</label>
        <input type="file" id="game-html" accept=".html,text/html" required>
        <span id="html-filename"></span>
      </div>
      <div class="form-error" id="create-error"></div>
      <button type="submit" class="btn btn-primary" id="publish-btn" disabled>Опубликовать</button>
    </form>
  </div>
</div>

<div id="shop-modal" class="modal" style="display: none;">
  <div class="modal-content glass">
    <span class="close-modal">&times;</span>
    <h2>Магазин скинов</h2>
    <div class="shop-tabs">
      <button class="shop-tab active" data-tab="skins">Скины</button>
      <button class="shop-tab" data-tab="boosters">Бустеры (скоро)</button>
    </div>
    <div id="shop-content" class="shop-content"></div>
  </div>
</div>

<div id="inventory-modal" class="modal" style="display: none;">
  <div class="modal-content glass">
    <span class="close-modal">&times;</span>
    <h2>Мои скины</h2>
    <div id="inventory-list" class="inventory-list"></div>
  </div>
</div>

<div id="matchmaking-modal" class="modal" style="display: none;">
  <div class="modal-content glass matchmaking-content">
    <h2>Поиск соперников</h2>
    <div class="radar"></div>
    <div id="matchmaking-timer">00:00</div>
    <div id="queue-status">В очереди: 0/2</div>
    <button id="cancel-matchmaking" class="btn btn-outline">Отмена</button>
  </div>
</div>

<div id="rating-modal" class="modal" style="display: none;">
  <div class="modal-content glass">
    <span class="close-modal">&times;</span>
    <h2>Оцените игру</h2>
    <p id="rating-game-title"></p>
    <div class="rating-buttons">
      <button id="rate-like" class="btn btn-like">👍 Лайк</button>
      <button id="rate-dislike" class="btn btn-dislike">👎 Дизлайк</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module" src="src/js/main.js"></script>
</body>
</html>
